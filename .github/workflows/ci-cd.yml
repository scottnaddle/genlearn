name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Job 1: Build & Test
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 1

  # ============================================
  # Job 2: Deploy to Vercel (Production)
  # ============================================
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://genlearn-eta.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          echo "Deploying..."
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} > /tmp/deploy_url.txt 2>&1
          DEPLOY_URL=$(cat /tmp/deploy_url.txt | grep -E "^https://" | head -1)
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

  # ============================================
  # Job 3: Smoke Tests (API)
  # ============================================
  smoke-test-api:
    name: Smoke Test - API
    runs-on: ubuntu-latest
    needs: deploy-vercel
    
    steps:
      - name: Test API Health
        run: |
          echo "Waiting for deployment propagation..."
          sleep 15
          DEPLOY_URL="${{ needs.deploy-vercel.outputs.DEPLOY_URL }}"
          echo "Testing: $DEPLOY_URL/api/health"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/health")
          echo "Health check status: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ /api/health OK"
          else
            echo "❌ /api/health FAILED"
            exit 1
          fi

  # ============================================
  # Job 4: Smoke Tests (Generation)
  # ============================================
  smoke-test-generation:
    name: Smoke Test - Content Generation
    runs-on: ubuntu-latest
    needs: deploy-vercel
    
    steps:
      - name: Test Content Generation
        run: |
          DEPLOY_URL="${{ needs.deploy-vercel.outputs.DEPLOY_URL }}"
          
          # Test ML-01
          echo "Testing ML-01 (Shorts Script)..."
          RESPONSE=$(curl -s -X POST "$DEPLOY_URL/api/generate" \
            -H "Content-Type: application/json" \
            -d '{"contentTypeId":"ML-01","topic":"테스트 주제","purpose":"PoC 테스트용"}')
          
          echo "ML-01 Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q '"valid":true'; then
            echo "✅ ML-01 validation passed"
          else
            echo "❌ ML-01 validation failed"
            exit 1
          fi
          
          # Test ML-05
          echo "Testing ML-05 (Glossary Snippet)..."
          RESPONSE=$(curl -s -X POST "$DEPLOY_URL/api/generate" \
            -H "Content-Type: application/json" \
            -d '{"contentTypeId":"ML-05","topic":"머신러닝","purpose":"학습용"}')
          
          if echo "$RESPONSE" | grep -q '"valid":true'; then
            echo "✅ ML-05 validation passed"
          else
            echo "❌ ML-05 validation failed"
            exit 1
          fi

  # ============================================
  # Job 5: Report
  # ============================================
  report:
    name: Deployment Report
    runs-on: ubuntu-latest
    needs: [deploy-vercel, smoke-test-api, smoke-test-generation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Generate Report
        run: |
          echo "==================================="
          echo "🎉 GenLearn CI/CD Pipeline Complete"
          echo "==================================="
          echo ""
          echo "📦 Deployment URL: ${{ needs.deploy-vercel.outputs.DEPLOY_URL }}"
          echo "🔗 GitHub Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          echo ""
          echo "✅ All tests passed!"
          echo "==================================="
